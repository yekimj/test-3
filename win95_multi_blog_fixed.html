
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Win95 멀티창 블로그</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      background-color: #c0c0c0;
      font-family: 'Courier New', monospace;
    }

    .taskbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #a0a0a0;
      border-top: 2px solid #808080;
      display: flex;
      padding: 4px;
      overflow-x: auto;
      gap: 4px;
    }

    .taskbar button {
      background-color: #dcdcdc;
      border: 2px outset #fff;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .window {
      width: 300px;
      position: absolute;
      top: 50px;
      left: 50px;
      border: 2px solid #000;
      background-color: #dfdfdf;
      box-shadow: 4px 4px #808080;
      z-index: 1;
    }

    .title-bar {
      background-color: #000080;
      color: white;
      padding: 0.3em 0.5em;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: move;
    }

    .title-bar button {
      background-color: silver;
      border: 1px solid black;
      font-size: 10px;
      font-weight: bold;
      width: 16px;
      height: 16px;
      padding: 0;
      cursor: pointer;
    }

    .window-content {
      padding: 1em;
      background: white;
      border-top: 1px solid #808080;
      border-bottom: 1px solid #808080;
    }

    .window-content input,
    .window-content textarea {
      width: 100%;
      margin-bottom: 0.5em;
      box-sizing: border-box;
      font-family: inherit;
    }

    textarea {
      height: 100px;
      resize: vertical;
    }

    .save-btn {
      display: block;
      margin-left: auto;
      padding: 4px 10px;
      font-size: 12px;
      background-color: #dcdcdc;
      border: 2px outset #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="taskbar" id="taskbar">
    <button onclick="createEditorWindow()">+ 새 글쓰기</button>
  </div>

  <script>
    let zIndexCounter = 2;

    function createEditorWindow(post = null) {
      const win = document.createElement('div');
      win.className = 'window';
      win.style.top = Math.random() * 200 + 'px';
      win.style.left = Math.random() * 200 + 'px';
      win.style.zIndex = zIndexCounter++;

      const titleBar = document.createElement('div');
      titleBar.className = 'title-bar';
      titleBar.innerHTML = '<span>' + (post ? post.title : 'New Post') + '</span>';

      const closeBtn = document.createElement('button');
      closeBtn.textContent = 'X';
      closeBtn.onclick = () => document.body.removeChild(win);
      titleBar.appendChild(closeBtn);

      const content = document.createElement('div');
      content.className = 'window-content';

      const titleInput = document.createElement('input');
      titleInput.placeholder = '제목';
      titleInput.value = post ? post.title : '';

      const bodyInput = document.createElement('textarea');
      bodyInput.placeholder = '내용';
      bodyInput.value = post ? post.content : '';

      const saveBtn = document.createElement('button');
      saveBtn.textContent = '저장';
      saveBtn.className = 'save-btn';
      saveBtn.onclick = () => {
        const posts = JSON.parse(localStorage.getItem('win95_posts') || '[]');
        posts.push({ title: titleInput.value, content: bodyInput.value });
        localStorage.setItem('win95_posts', JSON.stringify(posts));
        addTaskbarButton({ title: titleInput.value, content: bodyInput.value });
        document.body.removeChild(win);
      };

      content.appendChild(titleInput);
      content.appendChild(bodyInput);
      content.appendChild(saveBtn);

      win.appendChild(titleBar);
      win.appendChild(content);
      document.body.appendChild(win);
    }

    function addTaskbarButton(post) {
      const taskbar = document.getElementById('taskbar');
      const btn = document.createElement('button');
      btn.textContent = post.title;
      btn.onclick = () => createEditorWindow(post);
      taskbar.appendChild(btn);
    }

    const saved = JSON.parse(localStorage.getItem('win95_posts') || '[]');
    saved.forEach(addTaskbarButton);
  </script>
</body>
</html>
